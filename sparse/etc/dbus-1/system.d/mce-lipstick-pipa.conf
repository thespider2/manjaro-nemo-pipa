<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Lipstick on pipa needs this; missing from stock mce.conf on openSUSE. -->
  <policy context="default">
    <allow send_destination="com.nokia.mce"
           send_interface="com.nokia.mce.request"
           send_member="set_lpm_supported"/>
  </policy>
  <policy user="nemo">
    <allow send_destination="org.nemomobile.devicelock"
           send_interface="org.nemomobile.devicelock.DeviceLock"/>
    <allow send_destination="org.nemomobile.devicelock"
           send_interface="org.nemomobile.lipstick.devicelock"/>
  </policy>
</busconfig>
