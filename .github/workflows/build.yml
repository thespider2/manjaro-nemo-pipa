name: Build pipa flashables (esp/boot/rootfs)

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "profiles/**"
      - "scripts/**"
      - "efi-template/**"
      - "assets/**"
      - "Dockerfile"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: nemo-pipa-image
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh && ./scripts/validate-recipe.sh

  build-flashables:
    needs: validate
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            e2fsprogs dosfstools rsync wget curl ca-certificates \
            zip unzip cpio gzip xz-utils

      - name: Build Nemo pipa flash layout
        run: |
          mkdir -p images
          chmod +x scripts/*.sh
          # Privileged: loop mounts for esp/boot/rootfs
          sudo ./scripts/ci-build-image.sh
          sudo chown -R "$USER:$USER" images || true

      - name: Upload flashable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nemo-pipa-flashable
          path: |
            images/nemo_esp.raw
            images/nemo_boot.raw
            images/nemo_rootfs.raw
            images/silicium.img
            images/vbmeta-disabled.img
            images/flash.sh
            images/flash-multiboot.sh
            images/BUILDINFO.txt
            images/SHA256SUMS
            images/*.zip
            images/pipa-*.txt
            images/pipa-nemo-overlay.tar.gz
            images/upstream-rootfs.url
          retention-days: 14
          if-no-files-found: warn
          compression-level: 0
