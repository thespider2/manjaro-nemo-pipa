name: Fetch OBS NEMO image + pipa overlay

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "profiles/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: nemo-pipa-image
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh && ./scripts/validate-recipe.sh

  fetch-image:
    needs: validate
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream openSUSE NEMO + stage pipa overlay
        run: |
          mkdir -p images
          chmod +x scripts/*.sh
          ./scripts/ci-build-image.sh
          sudo chown -R "$USER:$USER" images || true

      - uses: actions/upload-artifact@v4
        with:
          name: opensuse-nemo-pipa
          path: images/
          retention-days: 14
