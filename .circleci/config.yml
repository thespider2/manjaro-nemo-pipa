version: 2.1
jobs:
  build_image:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.large
    steps:
      - checkout
      - run: chmod +x scripts/*.sh && ./scripts/validate-recipe.sh
      - run:
          name: Fetch OBS NEMO image
          no_output_timeout: 120m
          command: mkdir -p images && ./scripts/ci-build-image.sh
      - store_artifacts:
          path: images
workflows:
  build:
    jobs:
      - build_image
