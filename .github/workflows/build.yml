name: Build pipa flashables (esp/boot/rootfs)

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "profiles/**"
      - "scripts/**"
      - "sparse/**"
      - "efi-template/**"
      - "assets/**"
      - "Dockerfile"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: nemo-pipa-image
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh && ./scripts/validate-recipe.sh

  build-flashables:
    needs: validate
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            e2fsprogs dosfstools rsync wget curl ca-certificates \
            zip unzip cpio gzip xz-utils rpm2cpio git

      - name: Build full Nemo pipa flash layout
        run: |
          mkdir -p images
          chmod +x scripts/*.sh sparse/usr/bin/* || true
          # Full image: Glacier apps + HW + UI (PinePhone model)
          # Also builds glacier-camera/music/browser from git; falls back to
          # qcam / amberol / angelfish if builds fail.
          export INJECT_FULL_PACKAGES=1
          export BUILD_GLACIER_EXTRA_APPS=1
          sudo -E ./scripts/ci-build-image.sh
          sudo chown -R "$USER:$USER" images || true

      - name: Upload flashable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nemo-pipa-flashable
          path: |
            images/nemo_esp.raw.xz
            images/nemo_boot.raw.xz
            images/nemo_rootfs.raw.xz
            images/silicium.img.xz
            images/vbmeta-disabled.img.xz
            images/flash.sh
            images/flash-multiboot.sh
            images/BUILDINFO.txt
            images/SHA256SUMS
            images/upstream-rootfs.url
          retention-days: 14
          if-no-files-found: error
          compression-level: 0
