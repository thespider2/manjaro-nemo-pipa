version: 2.1
jobs:
  build_image:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.large
    steps:
      - checkout
      - run: chmod +x scripts/*.sh && ./scripts/validate-recipe.sh
      - run:
          name: Install tools
          command: |
            sudo apt-get update
            sudo apt-get install -y e2fsprogs dosfstools rsync wget curl zip cpio gzip xz-utils
      - run:
          name: Build flashables
          no_output_timeout: 180m
          command: |
            mkdir -p images
            sudo ./scripts/ci-build-image.sh
      - store_artifacts:
          path: images
workflows:
  build:
    jobs:
      - build_image
